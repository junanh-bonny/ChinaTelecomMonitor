name: Monitor Telecom Usage

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
    - cron: '0 8,20 * * *'  # 每天 UTC 时间 8:00 和 20:00 运行（北京时间 16:00 和次日 4:00）

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Download config from repository
        run: wget https://raw.githubusercontent.com/${{ github.repository }}/main/config.json -O config.json
        
      - name: Run monitor script
        run: python telecom_monitor.py
        
      - name: Save token file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/login_info.json
          git commit -m "Update token file"
          git push
